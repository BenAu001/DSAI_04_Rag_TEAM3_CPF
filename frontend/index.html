<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG — Ingest &amp; Ask</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3347;
      --accent: #6c7bff;
      --accent-hover: #8a97ff;
      --text: #e2e4f0;
      --text-muted: #7a7f9a;
      --success: #4caf86;
      --error: #e05c5c;
      --warn: #e0a55c;
      --radius: 10px;
      --font: 'Segoe UI', system-ui, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 4rem;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    header h1 { font-size: 2rem; font-weight: 700; letter-spacing: -0.5px; }
    header h1 span { color: var(--accent); }
    header p { color: var(--text-muted); margin-top: 0.4rem; font-size: 0.9rem; }

    .tabs {
      display: flex;
      gap: 0.5rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.35rem;
      margin-bottom: 2rem;
    }
    .tab-btn {
      flex: 1;
      padding: 0.6rem 2rem;
      border: none;
      border-radius: calc(var(--radius) - 2px);
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 500;
      transition: all 0.15s;
    }
    .tab-btn.active {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 2px 10px rgba(108,123,255,0.4);
    }
    .tab-btn:not(.active):hover { color: var(--text); background: var(--surface2); }

    .view { display: none; width: 100%; max-width: 780px; }
    .view.active { display: block; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-bottom: 1.25rem;
    }
    .card h2 { font-size: 1.05rem; font-weight: 600; margin-bottom: 1rem; }

    /* File list */
    .file-list { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; }
    .file-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.6rem 0.85rem;
      background: var(--surface2);
      border-radius: 6px;
      font-size: 0.88rem;
    }
    .file-badge {
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
    }
    .badge-pdf { background: #3d2222; color: #e05c5c; }
    .badge-csv { background: #1e3d2e; color: #4caf86; }
    .file-size { color: var(--text-muted); margin-left: auto; font-size: 0.8rem; }

    .empty-state {
      color: var(--text-muted);
      font-size: 0.9rem;
      text-align: center;
      padding: 1.5rem 0;
    }

    /* Status bar */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.65rem 1rem;
      border-radius: 6px;
      font-size: 0.88rem;
      margin-bottom: 1.25rem;
    }
    .status-bar.ready   { background: #1e3d2e; color: var(--success); border: 1px solid #2d5a3d; }
    .status-bar.empty   { background: #3d2d1a; color: var(--warn);   border: 1px solid #5a4020; }
    .status-bar.loading { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.65rem 1.4rem;
      border: none;
      border-radius: 7px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: var(--accent-hover); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Spinner */
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Result card */
    .result-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      margin-top: 1.25rem;
    }
    .result-card.hidden { display: none; }
    .answer-text {
      font-size: 0.95rem;
      line-height: 1.65;
      white-space: pre-wrap;
      color: var(--text);
    }

    /* Sources */
    .sources-header {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 1.25rem;
      margin-bottom: 0.6rem;
    }
    .source-item {
      border: 1px solid var(--border);
      border-radius: 6px;
      margin-bottom: 0.5rem;
      overflow: hidden;
    }
    .source-toggle {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.55rem 0.85rem;
      background: var(--surface);
      border: none;
      color: var(--text);
      cursor: pointer;
      text-align: left;
      font-size: 0.83rem;
    }
    .source-toggle:hover { background: var(--surface2); }
    .source-toggle .src-name { font-weight: 600; flex: 1; }
    .source-toggle .src-page { color: var(--text-muted); font-size: 0.78rem; }
    .source-toggle .chevron { color: var(--text-muted); transition: transform 0.15s; }
    .source-toggle.open .chevron { transform: rotate(90deg); }
    .source-body {
      display: none;
      padding: 0.75rem 0.85rem;
      font-size: 0.82rem;
      color: var(--text-muted);
      line-height: 1.5;
      border-top: 1px solid var(--border);
      background: var(--bg);
    }
    .source-body.open { display: block; }

    /* Ask input */
    .ask-input-wrap { display: flex; gap: 0.6rem; align-items: flex-end; }
    textarea {
      flex: 1;
      resize: vertical;
      min-height: 72px;
      padding: 0.75rem 1rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-family: var(--font);
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.15s;
    }
    textarea:focus { border-color: var(--accent); }

    /* Ingest result */
    .ingest-result {
      padding: 0.75rem 1rem;
      border-radius: 7px;
      font-size: 0.88rem;
      margin-top: 1rem;
    }
    .ingest-result.success { background: #1e3d2e; color: var(--success); border: 1px solid #2d5a3d; }
    .ingest-result.error   { background: #3d1e1e; color: var(--error);   border: 1px solid #5a2d2d; }
    .ingest-result.hidden  { display: none; }

    .dot { width: 8px; height: 8px; border-radius: 50%; }
    .dot-green { background: var(--success); }
    .dot-orange { background: var(--warn); }
  </style>
</head>
<body>

<header>
  <h1>RAG <span>Corpus</span></h1>
  <p>Ollama &nbsp;·&nbsp; LangChain &nbsp;·&nbsp; Chroma</p>
</header>

<!-- Tabs -->
<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('ingest')">Ingest</button>
  <button class="tab-btn"        onclick="switchTab('ask')">Ask</button>
</div>

<!-- ===== INGEST VIEW ===== -->
<div id="view-ingest" class="view active">

  <div id="corpus-status" class="status-bar loading">
    <div class="spinner" style="width:12px;height:12px;border-width:2px;border-color:rgba(255,255,255,.2);border-top-color:#7a7f9a"></div>
    Checking corpus…
  </div>

  <div class="card">
    <h2>Files in <code>data/</code></h2>
    <ul id="file-list" class="file-list">
      <li class="empty-state">Loading…</li>
    </ul>
  </div>

  <div style="display:flex; align-items:center; gap:1rem; flex-wrap:wrap;">
    <button class="btn btn-primary" id="ingest-btn" onclick="runIngest()">
      Ingest Documents
    </button>
    <button class="btn" style="background:var(--surface2);color:var(--text-muted);" onclick="refreshFiles()">
      Refresh
    </button>
  </div>

  <div id="ingest-result" class="ingest-result hidden"></div>
</div>

<!-- ===== ASK VIEW ===== -->
<div id="view-ask" class="view">

  <div id="ask-status" class="status-bar loading">
    <div class="spinner" style="width:12px;height:12px;border-width:2px;border-color:rgba(255,255,255,.2);border-top-color:#7a7f9a"></div>
    Checking corpus…
  </div>

  <div class="card">
    <h2>Ask a question</h2>
    <div class="ask-input-wrap">
      <textarea id="question-input" placeholder="Type your question here…" rows="3"
        onkeydown="if(event.key==='Enter'&&(event.ctrlKey||event.metaKey)) submitAsk()"></textarea>
      <button class="btn btn-primary" id="ask-btn" onclick="submitAsk()">
        Ask
      </button>
    </div>
    <div style="font-size:0.75rem;color:var(--text-muted);margin-top:0.4rem;">Ctrl+Enter to submit</div>
  </div>

  <div id="answer-card" class="result-card hidden">
    <div class="answer-text" id="answer-text"></div>
    <div id="sources-section" class="hidden">
      <div class="sources-header">Sources</div>
      <div id="sources-list"></div>
    </div>
  </div>
</div>

<script>
const API = '';  // same origin

// ── Tab switching ──────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', (i === 0 && tab === 'ingest') || (i === 1 && tab === 'ask'));
  });
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + tab).classList.add('active');
}

// ── Corpus status ──────────────────────────────────────────────
async function refreshStatus() {
  try {
    const res = await fetch(API + '/api/status');
    const data = await res.json();
    setStatus(data.has_documents, data.document_count);
  } catch {
    setStatus(false, 0, true);
  }
}

function setStatus(hasDocuments, count, error = false) {
  ['corpus-status', 'ask-status'].forEach(id => {
    const el = document.getElementById(id);
    if (error) {
      el.className = 'status-bar empty';
      el.innerHTML = '<div class="dot dot-orange"></div> Cannot reach backend';
      return;
    }
    if (hasDocuments) {
      el.className = 'status-bar ready';
      el.innerHTML = `<div class="dot dot-green"></div> ${count} chunks indexed — corpus is ready`;
    } else {
      el.className = 'status-bar empty';
      el.innerHTML = '<div class="dot dot-orange"></div> No documents ingested yet';
    }
  });
  document.getElementById('ask-btn').disabled = !hasDocuments;
}

// ── File list ──────────────────────────────────────────────────
async function refreshFiles() {
  const listEl = document.getElementById('file-list');
  listEl.innerHTML = '<li class="empty-state">Loading…</li>';
  try {
    const res = await fetch(API + '/api/files');
    const { files } = await res.json();
    if (!files.length) {
      listEl.innerHTML = '<li class="empty-state">No supported files found in <code>data/</code>.<br>Add PDF or CSV files and click Refresh.</li>';
      return;
    }
    listEl.innerHTML = files.map(f => `
      <li class="file-item">
        <span class="file-badge badge-${f.type}">${f.type}</span>
        ${escHtml(f.name)}
        <span class="file-size">${formatBytes(f.size)}</span>
      </li>`).join('');
  } catch {
    listEl.innerHTML = '<li class="empty-state" style="color:var(--error)">Failed to load files.</li>';
  }
}

// ── Ingest ─────────────────────────────────────────────────────
async function runIngest() {
  const btn = document.getElementById('ingest-btn');
  const resultEl = document.getElementById('ingest-result');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Ingesting…';
  resultEl.className = 'ingest-result hidden';

  try {
    const res = await fetch(API + '/api/ingest', { method: 'POST' });
    const data = await res.json();
    if (!res.ok) {
      resultEl.textContent = 'Error: ' + (data.detail || 'Unknown error');
      resultEl.className = 'ingest-result error';
    } else {
      resultEl.innerHTML = `
        Ingested <strong>${data.documents_ingested}</strong> chunks from
        <strong>${data.files_processed.length}</strong> file(s):
        ${data.files_processed.map(f => `<code>${escHtml(f)}</code>`).join(', ')}
        ${data.errors?.length ? `<br><span style="color:var(--warn)">Errors: ${data.errors.map(e => e.file).join(', ')}</span>` : ''}
      `;
      resultEl.className = 'ingest-result success';
      await refreshStatus();
    }
  } catch (e) {
    resultEl.textContent = 'Network error: ' + e.message;
    resultEl.className = 'ingest-result error';
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'Ingest Documents';
  }
}

// ── Ask ────────────────────────────────────────────────────────
async function submitAsk() {
  const question = document.getElementById('question-input').value.trim();
  if (!question) return;

  const btn = document.getElementById('ask-btn');
  const answerCard = document.getElementById('answer-card');
  const answerText = document.getElementById('answer-text');
  const sourcesSection = document.getElementById('sources-section');
  const sourcesList = document.getElementById('sources-list');

  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div>';
  answerCard.classList.remove('hidden');
  answerText.textContent = 'Thinking…';
  sourcesSection.classList.add('hidden');
  sourcesList.innerHTML = '';

  try {
    const res = await fetch(API + '/api/ask', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question }),
    });
    const data = await res.json();
    if (!res.ok) {
      answerText.style.color = 'var(--error)';
      answerText.textContent = 'Error: ' + (data.detail || 'Unknown error');
    } else {
      answerText.style.color = '';
      answerText.textContent = data.answer;

      if (data.sources?.length) {
        sourcesSection.classList.remove('hidden');
        sourcesList.innerHTML = data.sources.map((s, i) => `
          <div class="source-item">
            <button class="source-toggle" id="src-btn-${i}" onclick="toggleSource(${i})">
              <span class="chevron">&#9658;</span>
              <span class="src-name">${escHtml(fileName(s.source))}</span>
              ${s.page != null ? `<span class="src-page">p.${s.page}</span>` : ''}
            </button>
            <div class="source-body" id="src-body-${i}">${escHtml(s.snippet)}…</div>
          </div>`).join('');
      }
    }
  } catch (e) {
    answerText.style.color = 'var(--error)';
    answerText.textContent = 'Network error: ' + e.message;
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'Ask';
  }
}

function toggleSource(i) {
  const btn = document.getElementById('src-btn-' + i);
  const body = document.getElementById('src-body-' + i);
  btn.classList.toggle('open');
  body.classList.toggle('open');
}

// ── Helpers ────────────────────────────────────────────────────
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function fileName(path) {
  return path.split(/[\\/]/).pop();
}
function formatBytes(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1048576).toFixed(1) + ' MB';
}

// ── Init ───────────────────────────────────────────────────────
refreshStatus();
refreshFiles();
</script>
</body>
</html>
